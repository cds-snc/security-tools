name: JSON lint
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.json"
      - "**/*.json.tmpl"
      - ".github/workflows/json-lint.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.json"
      - "**/*.json.tmpl"
      - ".github/workflows/json-lint.yml"

jobs:
  json-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Lint JSON
        run: find . -not -path '*/.terragrunt-cache/*' -name "*.json" -exec cat {} \; | jq .

      - name: Lint JSON templates
        run: find . -not -path '*/.terragrunt-cache/*' -name "*.json.tmpl" -exec cat {} \; | sed "s/\${[^}]*}//g" | jq .
