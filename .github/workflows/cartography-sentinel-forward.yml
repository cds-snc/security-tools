name: Forward cartography exports to Sentinel

# Reads the latest cartography export manifest from S3, downloads chunked node and
# relationship payloads, and forwards each chunk to dedicated Sentinel custom
# streams. Auth is OIDC end-to-end: GitHub -> AWS (read S3) and GitHub -> Azure.
#
# Prerequisites (one-time):
#   - The Cartography_Nodes_CL and Cartography_Relationships_CL custom tables +
#     DCR streams exist (transformKql: "source");
#     see terragrunt/aws/cloud_asset_inventory/sentinel-forwarding.md.
#   - Azure AD app with a federated credential trusting this repo, and these repo
#     secrets set: SENTINEL_DCE_ENDPOINT, SENTINEL_NODE_DCR_RULE_ID,
#     SENTINEL_REL_DCR_RULE_ID, AZURE_CLIENT_ID, AZURE_TENANT_ID.
#   - The AWS OIDC role can read export objects (s3:GetObject on the bucket).
#   - Slack webhook secret for stale-export alerts:
#     SLACK_NOTIFY_WEBHOOK.

on:
  workflow_dispatch:
  schedule:
    # Cartography scans at 22:00 UTC; forward after the scan + export complete.
    - cron: "30 0 * * *"

env:
  AWS_REGION: ca-central-1
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT }}
  EXPORT_BUCKET: security-tools-cloud-asset-inventory-sentinel-exports
  EXPORT_PREFIX: sentinel-exports
  EXPORT_MAX_AGE_HOURS: "24"
  SENTINEL_DCE_ENDPOINT: ${{ secrets.SENTINEL_DCE_ENDPOINT }}
  SENTINEL_NODE_DCR_RULE_ID: ${{ secrets.SENTINEL_NODE_DCR_RULE_ID }}
  SENTINEL_NODE_STREAM_NAME: ${{ secrets.SENTINEL_NODE_STREAM_NAME }}
  SENTINEL_REL_DCR_RULE_ID: ${{ secrets.SENTINEL_REL_DCR_RULE_ID }}
  SENTINEL_REL_STREAM_NAME: ${{ secrets.SENTINEL_REL_STREAM_NAME }}
  SLACK_NOTIFY_WEBHOOK: ${{ secrets.SLACK_NOTIFY_WEBHOOK }}
  SENTINEL_NODE_AZURE_CLIENT_ID: ${{ secrets.SENTINEL_V2_AZURE_CLIENT_ID }}
  SENTINEL_NODE_AZURE_TENANT_ID: ${{ secrets.SENTINEL_V2_AZURE_TENANT_ID }}
  SENTINEL_REL_AZURE_CLIENT_ID: ${{ secrets.SENTINEL_V2_AZURE_CLIENT_ID }}
  SENTINEL_REL_AZURE_TENANT_ID: ${{ secrets.SENTINEL_V2_AZURE_TENANT_ID }}

permissions:
  id-token: write # OIDC to AWS (read S3) and Azure (the action)
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.manifest.outputs.run_id }}
      node_keys: ${{ steps.manifest.outputs.node_keys }}
      relationship_keys: ${{ steps.manifest.outputs.relationship_keys }}
      manifest_status: ${{ steps.manifest.outputs.manifest_status }}
      generated_at: ${{ steps.manifest.outputs.generated_at }}
      is_stale: ${{ steps.manifest.outputs.is_stale }}
      stale_reason: ${{ steps.manifest.outputs.stale_reason }}
    steps:
      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/sentinel-forwarder-s3-readonly
          role-session-name: SentinelForward
          aws-region: ${{ env.AWS_REGION }}

      - name: Download latest export manifest
        id: download_manifest
        continue-on-error: true
        run: aws s3 cp "s3://${EXPORT_BUCKET}/${EXPORT_PREFIX}/latest/manifest.json" ./manifest.json

      - name: Parse manifest and check staleness
        id: manifest
        run: |
          set -euo pipefail

          if [[ ! -f ./manifest.json ]]; then
            {
              echo "manifest_status=missing"
              echo "generated_at="
              echo "run_id="
              echo "node_keys=[]"
              echo "relationship_keys=[]"
              echo "is_stale=true"
              echo "stale_reason=latest manifest missing from S3"
            } >> "${GITHUB_OUTPUT}"
            echo "Latest manifest missing from S3; marking stale."
            exit 0
          fi

          run_id="$(jq -r '.RunId // ""' ./manifest.json)"
          generated_at="$(jq -r '.GeneratedAt // ""' ./manifest.json)"
          node_keys="$(jq -c '[.Nodes.Files[].Key]' ./manifest.json)"
          relationship_keys="$(jq -c '[.Relationships.Files[].Key]' ./manifest.json)"

          if [[ -z "${generated_at}" ]]; then
            is_stale="true"
            stale_reason="GeneratedAt missing in manifest"
          elif ! generated_epoch="$(date -u -d "${generated_at}" +%s 2>/dev/null)"; then
            is_stale="true"
            stale_reason="GeneratedAt invalid in manifest"
          else
            cutoff_epoch="$(date -u -d "${EXPORT_MAX_AGE_HOURS} hours ago" +%s)"
            if [[ "${generated_epoch}" -lt "${cutoff_epoch}" ]]; then
              is_stale="true"
              stale_reason="latest export older than ${EXPORT_MAX_AGE_HOURS}h"
            else
              is_stale="false"
              stale_reason=""
            fi
          fi

          {
            echo "manifest_status=present"
            echo "generated_at=${generated_at}"
            echo "run_id=${run_id}"
            echo "node_keys=${node_keys}"
            echo "relationship_keys=${relationship_keys}"
            echo "is_stale=${is_stale}"
            echo "stale_reason=${stale_reason}"
          } >> "${GITHUB_OUTPUT}"

          echo "Using export run: ${run_id}"
          echo "GeneratedAt: ${generated_at}"
          echo "Is stale: ${is_stale}"
          echo "Stale reason: ${stale_reason}"
          echo "Node files: $(jq -r '.Nodes.Files | length' ./manifest.json)"
          echo "Relationship files: $(jq -r '.Relationships.Files | length' ./manifest.json)"

  notify-stale-export:
    needs: prepare
    if: ${{ needs.prepare.outputs.manifest_status != 'present' || needs.prepare.outputs.is_stale == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack about stale or missing export
        env:
          SLACK_NOTIFY_WEBHOOK: ${{ env.SLACK_NOTIFY_WEBHOOK }}
          REPO_NAME: ${{ github.repository }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GENERATED_AT: ${{ needs.prepare.outputs.generated_at }}
          REASON: ${{ needs.prepare.outputs.stale_reason }}
          MAX_AGE_HOURS: ${{ env.EXPORT_MAX_AGE_HOURS }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"Cartography export freshness check failed in ${REPO_NAME}. Reason: ${REASON}. GeneratedAt: ${GENERATED_AT}. MaxAgeHours: ${MAX_AGE_HOURS}. Run: ${WORKFLOW_URL}\"}" \
          "${SLACK_NOTIFY_WEBHOOK}"

      - name: Exit with error
        run: |
          echo "Latest export is stale or missing; failing workflow."
          exit 1

  forward-nodes:
    needs: prepare
    if: ${{ needs.prepare.outputs.manifest_status == 'present' && needs.prepare.outputs.is_stale != 'true' && needs.prepare.outputs.node_keys != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        key: ${{ fromJson(needs.prepare.outputs.node_keys) }}
    steps:
      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/sentinel-forwarder-s3-readonly
          role-session-name: SentinelForwardNodes
          aws-region: ${{ env.AWS_REGION }}

      - name: Download node chunk
        run: aws s3 cp "s3://${EXPORT_BUCKET}/${{ matrix.key }}" ./payload.json

      - name: Forward node chunk to Sentinel
        uses: cds-snc/sentinel-forward-data-action@2b0831903177e4ba07c850c71ab2645f72cab269
        with:
          file_name: payload.json
          dce_endpoint: ${{ env.SENTINEL_DCE_ENDPOINT }}
          dcr_rule_id: ${{ env.SENTINEL_NODE_DCR_RULE_ID }}
          stream_name: ${{ env.SENTINEL_NODE_STREAM_NAME }}
          azure_client_id: ${{ env.SENTINEL_NODE_AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ env.SENTINEL_NODE_AZURE_TENANT_ID }}

  forward-relationships:
    needs: prepare
    if: ${{ needs.prepare.outputs.manifest_status == 'present' && needs.prepare.outputs.is_stale != 'true' && needs.prepare.outputs.relationship_keys != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        key: ${{ fromJson(needs.prepare.outputs.relationship_keys) }}
    steps:
      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/sentinel-forwarder-s3-readonly
          role-session-name: SentinelForwardRels
          aws-region: ${{ env.AWS_REGION }}

      - name: Download relationship chunk
        run: aws s3 cp "s3://${EXPORT_BUCKET}/${{ matrix.key }}" ./payload.json

      - name: Forward relationship chunk to Sentinel
        uses: cds-snc/sentinel-forward-data-action@2b0831903177e4ba07c850c71ab2645f72cab269
        with:
          file_name: payload.json
          dce_endpoint: ${{ env.SENTINEL_DCE_ENDPOINT }}
          dcr_rule_id: ${{ env.SENTINEL_REL_DCR_RULE_ID }}
          stream_name: ${{ env.SENTINEL_REL_STREAM_NAME }}
          azure_client_id: ${{ env.SENTINEL_REL_AZURE_CLIENT_ID }}
          azure_tenant_id: ${{ env.SENTINEL_REL_AZURE_TENANT_ID }}
