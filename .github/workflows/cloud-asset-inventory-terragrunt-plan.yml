name: "Terragrunt plan cloud asset inventory"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/cloud-asset-inventory-terragrunt-plan.yml"
      - "terragrunt/*/cloud_asset_inventory/**"
      - "terragrunt/*/common/**"
      - "terragrunt/env/terragrunt.hcl"

env:
  AWS_REGION: ca-central-1
  CONFTEST_VERSION: 0.68.2
  TERRAFORM_VERSION: 1.15.5
  TERRAGRUNT_VERSION: 1.0.6
  CARTOGRAPHY_IMAGE: "ghcr.io/cartography-cncf/cartography"
  CARTOGRAPHY_IMAGE_TAG: "0.136@sha256:bf34b2ca0aac8831c4fa859f51be3c26f2364e09d831ce8ed00ae42ff141e7c4"
  NEO4J_IMAGE: "neo4j"
  NEO4J_IMAGE_TAG: "5-community@sha256:0b5d3ab6ec1b866890dbfb53bf4fe1cf039f9e03c96165599a403005b7e7bcc3"
  TF_INPUT: false
  TF_VAR_customer_id: ${{ secrets.TF_VARS_LOG_ANALYTICS_CUSTOMER_ID }}
  TF_VAR_neo4j_password: ${{ secrets.TF_VARS_NEO4J_SECRETS_PASSWORD }}
  TF_VAR_shared_key: ${{ secrets.TF_VARS_LOG_ANALYTICS_SHARED_KEY }}

permissions:
  id-token: write
  contents: read
  pull-requests: write
  actions: write
  checks: write
  statuses: write

jobs:
  terragrunt-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform tools
        uses: cds-snc/terraform-tools-setup@5a19984bcb888600ad646e0caf5c6f4d0a54c165 # v1.2.0

      - uses: cds-snc/paths-filter@b316143212d841aed668b7b29240c719d603a9b9 # v2.10.4
        id: filter
        with:
          filters: |
            cloud_asset_inventory:
              - 'terragrunt/aws/cloud_asset_inventory/**'
              - 'terragrunt/env/cloud_asset_inventory/**'
            common:
              - '.github/workflows/cloud-asset-inventory-terragrunt-plan.yml'
              - 'terragrunt/env/common/**'
              - 'terragrunt/env/terragrunt.hcl'

      - name: configure aws credentials using OIDC
        uses: aws-actions/configure-aws-credentials@ffc08eae7350b1061d7de219e2135c75561fb680 # master
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT }}:role/security-tools-plan
          role-session-name: TFPlan
          aws-region: ${{ env.AWS_REGION }}

      - name: Get current date to determine if secrets need to be rotated
        run: echo "TF_VAR_password_change_id=$(date +'%Y-%m')" >> $GITHUB_ENV

      - name: Terragrunt plan cloud_asset_inventory
        if: ${{ steps.filter.outputs.cloud_asset_inventory == 'true' || steps.filter.outputs.common == 'true' }}
        uses: cds-snc/terraform-plan@39b0058bcf977fbd8b067b84d5a9f6165e356c32 # v3.7.0
        with:
          directory: "terragrunt/env/cloud_asset_inventory"
          comment-delete: "true"
          comment-title: "cloud_asset_inventory"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          terragrunt: "true"
